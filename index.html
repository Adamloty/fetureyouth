<body>

                    <a href="https://x.com/Futuree_Youth?s=09" target="_blank" class="social-icon square-icon" aria-label="X">

                </div>
            </div>
        </div>
    </section>
    
    <section id="contact-us" class="section">
        <div class="container">
            <h2 class="section-title">CONTACT US</h2>
            
            <div class="contact-container">
                <div class="contact-box">
                    <div class="contact-info">
                        <h3>Email</h3>
                        <p><a href="mailto:futureeyouth@gmail.com">futureeyouth@gmail.com</a></p>
                    </div>
                    
<form id="contact-form" class="contact-form" action="https://formsubmit.co/futureeyouth@gmail.com" method="POST">
    <!-- إعدادات FormSubmit -->
    <input type="hidden" name="_subject" value="رسالة جديدة من موقع Future Youth">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="https://futureyouth.org/thank-you">
    <input type="hidden" name="_captcha" value="true">
    
    <!-- حقل الاسم -->
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>
    
    <!-- حقل البريد الإلكتروني -->
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required>
    </div>
    
    <!-- حقل الرسالة -->
    <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
    </div>
    
    <!-- زر الإرسال -->
    <button type="submit" class="submit-btn">Send Message</button>
</form>
                <div class="whatsapp-box">
                    <div class="whatsapp-content">
                      <i class="fab fa-whatsapp whatsapp-icon"></i>
                      <h3>WhatsApp</h3>
                      <a href="https://wa.me/201505493670" target="_blank" class="whatsapp-btn">Chat Now</a>
                    </div>
                  </div>
            </div>
    </section>

</body>
